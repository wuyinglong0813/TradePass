server:
  port: 9999

wechat:
  app-id: ${WECHAT_APP_ID:wxd6d1e93a3868253e}
  app-secret: ${WECHAT_APP_SECRET:}

tradepass:
  dev:
    enabled: ${TRADEPASS_DEV_ENABLED:false}
  demo-data:
    enabled: ${TRADEPASS_DEMO_DATA_ENABLED:false}
  auth:
    session-hours: ${TRADEPASS_SESSION_HOURS:168}
  verification:
    auto-approve: ${TRADEPASS_VERIFICATION_AUTO_APPROVE:false}

spring:
  application:
    name: tradepass
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:1118}/tradepass?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:tradepass}
    password: ${DB_PASSWORD:tradepass_pwd}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
