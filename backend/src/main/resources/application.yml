server:
  port: 9999

wechat:
  app-id: ${WECHAT_APP_ID:wxd6d1e93a3868253e}
  app-secret: ${WECHAT_APP_SECRET:}

tradepass:
  dev:
    enabled: ${TRADEPASS_DEV_ENABLED:true}

spring:
  application:
    name: tradepass
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:1118}/tradepass?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:tradepass}
    password: ${DB_PASSWORD:tradepass_pwd}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
